{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🌸</div>
    <div class="auth-title">加入次元漫谈</div>

    <form method="post" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label">用户名 <span style="color:var(--danger)">*</span></label>
        <input type="text" name="username" class="form-control" placeholder="2-20个字符" required autofocus
               minlength="2" maxlength="20">
        <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">用户名注册后不可修改</div>
      </div>
      <div class="form-group">
        <label class="form-label">密码 <span style="color:var(--danger)">*</span></label>
        <input type="password" name="password" class="form-control" placeholder="至少6个字符" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">确认密码 <span style="color:var(--danger)">*</span></label>
        <input type="password" name="confirm_password" class="form-control" placeholder="再次输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">📝 立即注册</button>
    </form>

    <div class="auth-footer">
      已有账号？<a href="{{ url_for('login') }}">直接登录</a>
    </div>
  </div>
</div>
{% endblock %}
