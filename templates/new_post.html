{% extends "base.html" %}
{% block title %}发布新帖{% endblock %}
{% block content %}
<div class="main-container" style="max-width:800px;">
  <div class="page-header">
    <div class="page-title">✏️ 发布新帖子</div>
    <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm">← 返回首页</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post" action="{{ url_for('new_post') }}">
        <div class="form-group">
          <label class="form-label">帖子标题 <span style="color:var(--danger)">*</span></label>
          <input type="text" name="title" class="form-control" placeholder="起一个吸引人的标题..." 
                 required maxlength="100" data-maxlength="100" data-counter="title-counter">
          <div style="text-align:right; margin-top:4px;">
            <span id="title-counter" style="font-size:0.75rem; color:var(--text-muted);">0 / 100</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">所属版块</label>
          <select name="category_id" class="form-control">
            <option value="">-- 请选择版块 --</option>
            {% for cat in all_categories %}
            <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}{% if cat.description %} - {{ cat.description }}{% endif %}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">帖子内容 <span style="color:var(--danger)">*</span></label>
          <textarea name="content" class="form-control" rows="12" 
                    placeholder="在这里分享你的想法、推荐、感想... (Ctrl+Enter 快捷提交)" 
                    required data-maxlength="10000" data-counter="content-counter"></textarea>
          <div style="text-align:right; margin-top:4px;">
            <span id="content-counter" style="font-size:0.75rem; color:var(--text-muted);">0 / 10000</span>
          </div>
          <div style="margin-top:6px; font-size:0.78rem; color:var(--text-muted);">💡 支持换行，文字会原样显示</div>
        </div>

        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary btn-lg">🚀 发布帖子</button>
          <a href="{{ url_for('index') }}" class="btn btn-secondary btn-lg">取消</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
