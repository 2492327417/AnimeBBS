{% extends "base.html" %}
{% block title %}{{ code }} 错误{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:60vh; padding:40px 20px;">
  <div style="text-align:center;">
    <div style="font-size:5rem; font-weight:900; background:linear-gradient(135deg,#7c4dff,#ff4081); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:16px;">{{ code }}</div>
    <div style="font-size:4rem; margin-bottom:20px;">
      {% if code == 404 %}🔍{% else %}😵{% endif %}
    </div>
    <h2 style="font-size:1.3rem; margin-bottom:8px; color:var(--text-primary);">{{ message }}</h2>
    <p style="color:var(--text-muted); margin-bottom:24px;">
      {% if code == 404 %}你访问的页面不存在，可能已被删除或链接有误。{% else %}服务器出了点小问题，请稍后再试。{% endif %}
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">🏠 回到首页</a>
  </div>
</div>
{% endblock %}
