{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🌸</div>
    <div class="auth-title">欢迎回来</div>

    <form method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">🔑 登录</button>
    </form>

    <div class="auth-footer">
      还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
    </div>
  </div>
</div>
{% endblock %}
